# ─────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Portal CRM (Saas-Tecnica)
# Documentação: CLAUDE.md → Seção 7
#
# Secrets (GitHub → Settings → Secrets and variables → Actions):
#   API_GATEWAY_URL          → URL base do gateway de validação
#   API_GATEWAY_PENTEST_KEY  → chave HMAC para assinar o payload
#   HOMOLOG_API_URL          → endpoint de homologação (opcional)
#   HOMOLOG_API_TOKEN        → token para homologação (opcional)
# ─────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── JOB 1: Build & Lint ────────────────────────────────────────
  build:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/
          retention-days: 1

      - name: Criar Issue de erro
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'ci-error', state: 'open'
            });
            for (const issue of open) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed',
                body: issue.body + '\n\n> ⚠️ Fechada — novo erro gerado.'
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `❌ Build falhou — ${sha}`,
              body: [
                `## Erro de CI/CD`,
                `| Campo | Valor |`,
                `|---|---|`,
                `| Commit | \`${context.sha}\` |`,
                `| Autor | @${context.actor} |`,
                `| Run | [Ver detalhes](${runUrl}) |`,
              ].join('\n'),
              labels: ['ci-error']
            });

  # ── JOB 2: Homologação ─────────────────────────────────────────
  homologacao:
    name: 🧪 Homologação
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: API Check de Homologação
        env:
          HOMOLOG_API_URL:   ${{ secrets.HOMOLOG_API_URL }}
          HOMOLOG_API_TOKEN: ${{ secrets.HOMOLOG_API_TOKEN }}
        run: |
          if [ -z "$HOMOLOG_API_URL" ]; then
            echo "⚠️  HOMOLOG_API_URL não configurado — etapa pulada"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
            -X POST "$HOMOLOG_API_URL" \
            -H "Authorization: Bearer $HOMOLOG_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${{ github.repository }}\",\"commit\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\"}")
          echo "HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || exit 1

  # ── JOB 3: Acionar Gateway de Validação ────────────────────────
  notify:
    name: ✅ Acionar Gateway
    runs-on: ubuntu-latest
    needs: [build, homologacao]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success' &&
      (needs.homologacao.result == 'success' || needs.homologacao.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disparar pentest/validação via gateway
        env:
          API_GATEWAY_URL:         ${{ secrets.API_GATEWAY_URL }}
          API_GATEWAY_PENTEST_KEY: ${{ secrets.API_GATEWAY_PENTEST_KEY }}
          GITHUB_SHA:              ${{ github.sha }}
          GITHUB_REF_NAME:         ${{ github.ref_name }}
          GITHUB_ACTOR:            ${{ github.actor }}
          GITHUB_SERVER_URL:       ${{ github.server_url }}
          GITHUB_REPOSITORY:       ${{ github.repository }}
          GITHUB_RUN_ID:           ${{ github.run_id }}
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$API_GATEWAY_URL" ]; then
            echo "⚠️  API_GATEWAY_URL não configurado — pulado"
            exit 0
          fi
          python3 << 'PYEOF'
          import hashlib, hmac, json, os, requests

          GATEWAY_URL = os.getenv("API_GATEWAY_URL")
          GATEWAY_KEY = os.getenv("API_GATEWAY_PENTEST_KEY")

          payload = {
            "event":   "build_approved",
            "commit":  os.getenv("GITHUB_SHA", ""),
            "branch":  os.getenv("GITHUB_REF_NAME", ""),
            "actor":   os.getenv("GITHUB_ACTOR", ""),
            "message": os.getenv("GITHUB_EVENT_HEAD_COMMIT_MESSAGE", ""),
            "run_url": f"{os.getenv('GITHUB_SERVER_URL')}/{os.getenv('GITHUB_REPOSITORY')}/actions/runs/{os.getenv('GITHUB_RUN_ID')}"
          }

          body = json.dumps(payload, separators=(",", ":")).encode()
          sig  = "sha256=" + hmac.new(GATEWAY_KEY.encode(), body, hashlib.sha256).hexdigest()

          resp = requests.post(
            f"{GATEWAY_URL}/pentest/trigger",
            data=body,
            headers={
              "Content-Type":        "application/json",
              "X-API-Key":           GATEWAY_KEY,
              "X-Hub-Signature-256": sig,
            }
          )
          print(resp.status_code, resp.json())
          resp.raise_for_status()
          PYEOF

      - name: Fechar issue ci-error se existir
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'ci-error', state: 'open'
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed',
                body: issue.body + `\n\n> ✅ Resolvido em \`${{ github.sha }}\``
              });
            }

      - name: Resumo
        run: |
          echo "### ✅ Build aprovado e gateway acionado" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Autor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
