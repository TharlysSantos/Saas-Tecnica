# ─────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Portal CRM (Saas-Tecnica)
# Documentação: CLAUDE.md → Seção 7
#
# Quando falha: cria uma Issue com label ci-error.
# O agente Claude (Cowork) detecta a issue e traz o erro para análise.
#
# Secrets necessários (Settings → Secrets → Actions):
#   PROD_PAT          → PAT com write em Saas-Tecnica_Prod
#   HOMOLOG_API_URL   → Endpoint de homologação (opcional por ora)
#   HOMOLOG_API_TOKEN → Token para o endpoint acima (opcional)
# ─────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── JOB 1: Build & Lint ────────────────────────────────────────
  build:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint 2>&1 | tee /tmp/lint-output.txt
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build 2>&1 | tee /tmp/build-output.txt
        continue-on-error: true

      - name: Montar log de erro
        id: error-log
        if: steps.lint.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          {
            echo "## Lint"
            cat /tmp/lint-output.txt 2>/dev/null || echo "(sem output)"
            echo ""
            echo "## Build"
            cat /tmp/build-output.txt 2>/dev/null || echo "(sem output)"
            echo ""
            echo "## Contexto"
            echo "Commit: ${{ github.sha }}"
            echo "Autor:  ${{ github.actor }}"
            echo "Msg:    $(git log -1 --pretty=%B)"
            echo "Arquivos alterados:"
            git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "(não disponível)"
            echo "Lint:   ${{ steps.lint.outcome }}"
            echo "Build:  ${{ steps.build.outcome }}"
          } > /tmp/error-log.txt
          echo "has_error=true" >> $GITHUB_OUTPUT

      - name: Criar Issue de erro
        if: steps.error-log.outputs.has_error == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/error-log.txt', 'utf8').slice(0, 6000);
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Fechar issues antigas de ci-error abertas para evitar acúmulo
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-error',
              state: 'open'
            });
            for (const issue of open) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                body: issue.body + '\n\n> ⚠️ Fechada automaticamente — novo erro gerado.'
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Build falhou — ${sha}`,
              body: [
                `## Erro de CI/CD detectado`,
                ``,
                `| Campo | Valor |`,
                `|---|---|`,
                `| Commit | \`${context.sha}\` |`,
                `| Autor | @${context.actor} |`,
                `| Run | [Ver detalhes](${runUrl}) |`,
                `| Lint | ${{ steps.lint.outcome }} |`,
                `| Build | ${{ steps.build.outcome }} |`,
                ``,
                `### Log`,
                `\`\`\``,
                log,
                `\`\`\``,
              ].join('\n'),
              labels: ['ci-error']
            });

            console.log(`✅ Issue criada para o commit ${sha}`);

      - name: Falhar o job se houve erro
        if: steps.error-log.outputs.has_error == 'true'
        run: exit 1

      - name: Upload dist
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── JOB 2: Homologação ─────────────────────────────────────────
  homologacao:
    name: 🧪 Homologação
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success'

    steps:
      - name: API Check de Homologação
        id: api-check
        env:
          HOMOLOG_API_URL:   ${{ secrets.HOMOLOG_API_URL }}
          HOMOLOG_API_TOKEN: ${{ secrets.HOMOLOG_API_TOKEN }}
        run: |
          if [ -z "$HOMOLOG_API_URL" ]; then
            echo "⚠️  HOMOLOG_API_URL não configurado — etapa pulada"
            echo "result=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 \
            -X POST "$HOMOLOG_API_URL" \
            -H "Authorization: Bearer $HOMOLOG_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\":   \"${{ github.repository }}\",
              \"commit\": \"${{ github.sha }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"actor\":  \"${{ github.actor }}\",
              \"run_id\": \"${{ github.run_id }}\"
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP: $HTTP_CODE | Body: $BODY"

          [ "$HTTP_CODE" = "200" ] && echo "result=passed" >> $GITHUB_OUTPUT || { echo "result=failed" >> $GITHUB_OUTPUT; exit 1; }

  # ── JOB 3: Deploy → Produção ───────────────────────────────────
  deploy:
    name: 🚀 Deploy → Produção
    runs-on: ubuntu-latest
    needs: [build, homologacao]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.homologacao.result == 'success'

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Push para Saas-Tecnica_Prod
        env:
          PROD_PAT: ${{ secrets.PROD_PAT }}
        run: |
          [ -z "$PROD_PAT" ] && echo "❌ PROD_PAT não configurado" && exit 1

          git config --global user.email "ci-bot@portalcrm"
          git config --global user.name  "CI/CD Bot"
          cd dist
          git init
          git remote add origin "https://x-access-token:${PROD_PAT}@github.com/TharlysSantos/Saas-Tecnica_Prod.git"
          git checkout -b main
          cat > .deploy-info.json << DEPEOF
          {
            "source_commit": "${{ github.sha }}",
            "deployed_by":   "${{ github.actor }}",
            "deployed_at":   "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "run_id":        "${{ github.run_id }}"
          }
          DEPEOF
          git add .
          git commit -m "deploy: ${{ github.sha }} by ${{ github.actor }}"
          git push --force origin main
          echo "### 🚀 Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Fechar issue ci-error se existir
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-error',
              state: 'open'
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                body: issue.body + `\n\n> ✅ Resolvido no deploy \`${{ github.sha }}\``
              });
            }
